name: Deploy Remote MCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-remote-mcp
  cancel-in-progress: false

jobs:
  build:
    name: Build and deploy remote MCP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Set image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/orbitali-mcp" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=remote-mcp
          cache-to: type=gha,mode=max,scope=remote-mcp

      - name: Request platform rollout
        env:
          CI_ROLLOUT_TOKEN: ${{ secrets.CI_ROLLOUT_TOKEN }}
          CI_ROLLOUT_URL: ${{ secrets.CI_ROLLOUT_URL }}
        shell: bash
        run: |
          set -euo pipefail

          : "${CI_ROLLOUT_URL:=https://ci.orbitali.ai/rollout}"

          if [[ -z "${CI_ROLLOUT_TOKEN}" ]]; then
            echo "CI_ROLLOUT_TOKEN secret is required"
            exit 1
          fi

          payload="$(jq -cn \
            --arg service "mcp" \
            --arg image "${{ steps.image.outputs.name }}" \
            --arg sha "${GITHUB_SHA}" \
            --arg runId "${GITHUB_RUN_ID}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            '{service: $service, image: $image, sha: $sha, runId: $runId, repository: $repository}')"

          curl -fsS \
            -X POST "${CI_ROLLOUT_URL}" \
            -H "authorization: Bearer ${CI_ROLLOUT_TOKEN}" \
            -H "content-type: application/json" \
            --data "${payload}"
